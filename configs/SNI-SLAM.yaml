scale: 1
verbose: False
device: "cuda"
keyframe_device: "cpu" # Change this to "cpu" to reduce GPU memory usage
feature_device: "cpu"

planes_res:
  coarse: 0.24
  fine: 0.06
  bound_dividable: 0.24
c_planes_res:
  coarse: 0.24
  fine: 0.03
s_planes_res:
  coarse: 0.24
  fine: 0.03

