meshing:
  level_set: 0
  resolution: 0.1
  # resolution: 0.01
  eval_rec: False
  mesh_bound_scale: 1.02
tracking:
  ignore_edge_W: 75
  ignore_edge_H: 75
  vis_freq: 10000
  vis_inside_freq: 400
  const_speed_assumption: True
  no_vis_on_first_frame: True
  lr_T: 0.001
  lr_R: 0.001
  pixels: 2000
  # pixels: 10000
  iters: 8
  w_sdf_fs: 10
  w_sdf_center: 200
  w_sdf_tail: 50
  w_depth: 1
  w_color: 5
  w_semantic: 0.01

mapping:
  every_frame: 4
  joint_opt: True
  joint_opt_cam_lr: 0.001
  no_vis_on_first_frame: True
  no_mesh_on_first_frame: True
  no_log_on_first_frame: True
  vis_freq: 10
  vis_inside_freq: 10
  # mesh_freq: 40
  mesh_freq: 500
  ckpt_freq: 500
  keyframe_every: 4
  mapping_window_size: 5
  keyframe_selection_method: 'overlap'
  lr_first_factor: 5
  lr_factor: 1
  pixels: 4000
  # pixels: 40000
  iters_first: 1000
  iters: 15
  # iters: 50
  w_sdf_fs: 5
  w_sdf_center: 200
  w_sdf_tail: 10
  w_depth: 0.1
  w_color: 5
  w_feature: 5
  w_semantic: 0.1
  lr:
    decoders_lr: 0.001
    planes_lr: 0.005
    c_planes_lr: 0.005
cam:
