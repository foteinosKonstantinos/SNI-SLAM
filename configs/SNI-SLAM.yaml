  # cy: 339.5
  H: 480
  W: 640
  fx: 606.383605957031
  fy: 605.308898925781
  cx: 319.168640136719
  cy: 231.037185668945
  png_depth_scale: 1000.0 #for depth image in png format
  crop_edge: 0
rendering:
  n_stratified: 32
  n_importance: 8
  perturb: True
  learnable_beta: True
model:
  c_dim: 16
  truncation: 0.06
  hidden_dim: 32
  fused_hidden_dim: 16
  sem_hidden_dim: 256
  encoder:
    multires: 6
  cnn:
    # n_classes: 52
    n_classes: 9
